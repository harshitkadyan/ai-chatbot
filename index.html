<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        .chat-container {
            width: 400px;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        #chatBox {
            height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
        }

        .user {
            text-align: right;
            color: blue;
            margin: 5px;
        }

        .bot {
            text-align: left;
            color: green;
            margin: 5px;
        }
    </style>
</head>

<body>

<div class="chat-container">
    <h3>AI Chatbot</h3>

    <div id="chatBox"></div>

    <input type="text" id="msg" placeholder="Type message..." />
    <button id="sendBtn" onclick="sendMsg()">Send</button>
</div>

<script>

// 🔥 ENTER KEY SUPPORT
document.getElementById("msg").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMsg();
    }
});

async function sendMsg() {
    let input = document.getElementById("msg");
    let message = input.value;
    let btn = document.getElementById("sendBtn");

    if (message.trim() === "") return;

    let chatBox = document.getElementById("chatBox");

    // Show user message
    chatBox.innerHTML += `<p class="user">You: ${message}</p>`;

    input.value = "";

    // 🔥 Disable button
    btn.disabled = true;

    // 🔥 Typing indicator
    chatBox.innerHTML += `<p class="bot" id="typing">Bot is typing...</p>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    let res = await fetch("http://127.0.0.1:10000/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: message })
    });

    let data = await res.json();

    // Remove typing text
    document.getElementById("typing").remove();

    // Show bot reply
    chatBox.innerHTML += `<p class="bot">${data.response}</p>`;

    chatBox.scrollTop = chatBox.scrollHeight;

    // 🔥 Enable button again
    btn.disabled = false;
}
</script>

</body>
</html>
